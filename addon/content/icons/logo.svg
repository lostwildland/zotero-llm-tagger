<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">AI Tagger retro-futurist bookmark logo</title>
  <desc id="desc">A chrome bookmark badge with a neon horizon, circuit nodes, and a central tag mark.</desc>
  <defs>
    <linearGradient id="sky" x1="22" y1="10" x2="106" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2ff7d0" />
      <stop offset="0.46" stop-color="#3949ff" />
      <stop offset="1" stop-color="#ff4fd8" />
    </linearGradient>
    <linearGradient id="chrome" x1="16" y1="11" x2="111" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8f0d8" />
      <stop offset="0.28" stop-color="#8fe8ff" />
      <stop offset="0.58" stop-color="#242a55" />
      <stop offset="1" stop-color="#ffb86c" />
    </linearGradient>
    <linearGradient id="sun" x1="40" y1="28" x2="88" y2="76" gradientUnits="userSpaceOnUse">
